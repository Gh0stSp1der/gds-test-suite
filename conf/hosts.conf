# ─────────────────────────────────────────────────────────────────
# hosts.conf — GDS 벤치마크 테스트 대상 호스트 목록
# ─────────────────────────────────────────────────────────────────
#
# [사전 요구사항]
#   1. 이 스크립트를 실행하는 노드에서 root 권한 필요
#   2. 아래 모든 호스트에 패스워드 없이 SSH 접속 가능해야 함
#      (키가 없으면 먼저 생성: ssh-keygen -t rsa -N "")
#      각 호스트에 키 배포:
#        for h in <hostname>; do ssh-copy-id -y root@${h}; done
#
# [수정 방법]
#   호스트 추가/제거: 아래 변수의 리스트를 공백으로 구분하여 수정
#   source 방식으로 로드: source /root/thkim/tta_gds_root/conf/hosts.conf
#   배열로 변환: GPU_HOSTS_ARR=($GPU_HOSTS)
# ─────────────────────────────────────────────────────────────────

# GPU 클라이언트 서버 (gdsio 테스트 실행 대상)
# 4노드: 단일 400Gb NIC + H100 NVL (io500-2는 mlx5_1 사용)
#GPU_HOSTS="io500-2 io500-3 io500-5 io500-7"
GPU_HOSTS="io500-2 io500-3 io500-4 io500-5 io500-6 io500-7"

# Lustre 스토리지 서버 (aic1=MGS/MDT0/OST0~7, aic2=MDT1/OST8~15)
STORAGE_HOSTS="aic1 aic2"
